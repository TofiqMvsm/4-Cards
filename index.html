<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/styles.css">
    <!-- Font link -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="img"> 
                <img class="card-image" src="./img/image 9.png" alt="lamp">
             </div>
            <div class="content">
                <h3 class="heading-name">Grifo</h3>
                <p class="info">Night lamp</p>
                <h4 class="price">Rp 1.500.000</h4>
            </div>
        </div>

        <div class="card">
            <div class="img">
                <img class="card-image" src="./img/image 6.png" alt="cup">
             </div>
            <div class="new">
                <span>New</span>
            </div>

            <div class="content">
                <h3 class="heading-name">Muggo</h3>
                <p class="info">Small mug</p>
                <h4 class="price">Rp 150.000</h4>
            </div>
        </div>

        <div class="card">
            <div class="img"><img class="card-image" src="./img/image 7.png" alt="bed"></div>
            <div class="discount">
                <span>50%</span>
            </div>
            <div class="content">
                <h3 class="heading-name">Pingky</h3>
                <p class="info">Cute bed set</p>
                <h4 class="price">Rp 7.000.000 <span class="old-price"> Rp 14.000.000</span> </h4>

            </div>
        </div>
        <div class="card">
            <div class="img"><img class="card-image" src="./img/image 8.png" alt="vase"> </div>
            <div class="new">
                <span>New</span>
            </div>
            <div class="content">
                <h3 class="heading-name">Pingky</h3>
                <p class="info">Cute bed set</p>
                <h4 class="price">Rp 7.000.000</h4>
            </div>
        </div>
    </div>
</body>

</html>
